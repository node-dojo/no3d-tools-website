<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Successful - NO3D TOOLS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="preload" href="./fonts/visitor.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <style>
      @font-face {
        font-family: 'Visitor';
        src: url('./fonts/visitor.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Visitor TT1 BRK';
        src: url('./fonts/visitor.woff2') format('woff2');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
      /* Success Page Specific Styles */
      .success-page-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: var(--space-large);
        background-color: var(--color-stone-gray);
      }

      .success-card {
        background-color: var(--color-paper-white);
        border: 1px solid var(--color-void-black);
        max-width: 600px;
        width: 100%;
        padding: var(--space-xlarge);
        text-align: center;
      }

      .success-icon {
        width: 80px;
        height: 80px;
        background-color: var(--color-lello);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto var(--space-large);
        border: 2px solid var(--color-void-black);
      }

      .success-icon i {
        font-size: 40px;
        color: var(--color-void-black);
      }

      .success-title {
        font-family: var(--font-visitor);
        font-size: 28px;
        letter-spacing: var(--letter-spacing-wide);
        margin-bottom: var(--space-medium);
        color: var(--color-void-black);
      }

      .success-message {
        font-family: var(--font-mono);
        font-size: var(--font-size-base);
        line-height: 1.6;
        color: var(--color-dark-gray);
        margin-bottom: var(--space-large);
      }

      .order-details {
        background-color: var(--color-stone-gray);
        border: 1px solid var(--color-void-black);
        padding: var(--space-medium);
        margin-bottom: var(--space-large);
        text-align: left;
      }

      .order-details-title {
        font-family: var(--font-visitor);
        font-size: 14px;
        letter-spacing: var(--letter-spacing-wide);
        margin-bottom: var(--space-small);
        color: var(--color-void-black);
      }

      .order-detail-row {
        display: flex;
        justify-content: space-between;
        font-family: var(--font-mono);
        font-size: 10px;
        margin-bottom: 4px;
        color: var(--color-dark-gray);
      }

      .order-detail-row .label {
        color: var(--color-void-black);
      }

      .primary-cta {
        display: inline-block;
        background-color: var(--color-lello);
        color: var(--color-void-black);
        font-family: var(--font-visitor);
        font-size: 16px;
        letter-spacing: var(--letter-spacing-wide);
        padding: var(--space-medium) var(--space-xlarge);
        border: 1px solid var(--color-void-black);
        text-decoration: none;
        transition: all var(--transition-fast);
        cursor: pointer;
        margin-bottom: var(--space-medium);
        width: 100%;
        box-sizing: border-box;
      }

      .primary-cta:hover {
        background-color: var(--color-void-black);
        color: var(--color-lello);
      }

      .secondary-link {
        display: inline-block;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--color-dark-gray);
        text-decoration: underline;
        transition: color var(--transition-fast);
      }

      .secondary-link:hover {
        color: var(--color-void-black);
      }

      .loading-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-medium);
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--color-stone-gray);
        border-top: 3px solid var(--color-lello);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .help-text {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--color-dark-gray);
        margin-top: var(--space-large);
        padding-top: var(--space-medium);
        border-top: 1px solid var(--color-stone-gray);
      }

      .help-text a {
        color: var(--color-dark-gray);
      }

      /* Onboarding steps */
      .onboarding-steps {
        text-align: left;
        margin: var(--space-large) 0;
        padding: var(--space-medium);
        background-color: var(--color-stone-gray);
        border: 1px solid var(--color-void-black);
      }

      .onboarding-steps h3 {
        font-family: var(--font-visitor);
        font-size: 14px;
        letter-spacing: var(--letter-spacing-wide);
        margin-bottom: var(--space-medium);
        color: var(--color-void-black);
      }

      .onboarding-step {
        display: flex;
        align-items: flex-start;
        gap: var(--space-small);
        margin-bottom: var(--space-medium);
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--color-dark-gray);
        line-height: 1.6;
      }

      .onboarding-step:last-child {
        margin-bottom: 0;
      }

      .step-number {
        font-family: var(--font-visitor);
        font-size: 14px;
        color: var(--color-void-black);
        background: var(--color-lello);
        border: 1px solid var(--color-void-black);
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .step-content {
        flex: 1;
        padding-top: 3px;
      }

      .addon-download-btn {
        display: inline-block;
        background: var(--color-void-black);
        color: var(--color-lello);
        border: 1px solid var(--color-void-black);
        padding: var(--space-small) var(--space-large);
        font-family: var(--font-visitor);
        font-size: 12px;
        letter-spacing: var(--letter-spacing-wide);
        cursor: pointer;
        text-decoration: none;
        transition: all var(--transition-fast);
        margin-top: var(--space-small);
      }

      .addon-download-btn:hover {
        background: var(--color-lello);
        color: var(--color-void-black);
      }

      /* Logo styling */
      .success-logo {
        margin-bottom: var(--space-large);
      }

      .success-logo img {
        height: 40px;
        width: auto;
      }

      /* License key section */
      .license-key-section {
        margin: var(--space-large) 0;
        padding: var(--space-medium);
        background-color: var(--color-stone-gray);
        border: 1px solid var(--color-void-black);
        text-align: center;
      }

      .license-key-section h3 {
        font-family: var(--font-visitor);
        font-size: 14px;
        letter-spacing: var(--letter-spacing-wide);
        margin-bottom: var(--space-small);
        color: var(--color-void-black);
      }

      #license-status {
        font-family: var(--font-mono);
        font-size: var(--font-size-small);
        color: var(--color-dark-gray);
        margin-bottom: var(--space-small);
      }

      .license-progress-wrap {
        width: 100%;
        height: 6px;
        background: var(--color-stone-gray);
        border: 1px solid var(--color-void-black);
        margin: var(--space-small) 0;
        overflow: hidden;
      }

      .license-progress-bar {
        height: 100%;
        width: 0%;
        background: var(--color-lello);
        transition: width 0.4s ease;
      }

      .license-progress-bar.indeterminate {
        width: 30%;
        animation: indeterminate 1.5s ease-in-out infinite;
      }

      @keyframes indeterminate {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(433%); }
      }

      .license-progress-bar.complete {
        width: 100%;
        animation: none;
      }

      .license-key-box {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        letter-spacing: 2px;
        background: var(--color-lello);
        color: var(--color-void-black);
        padding: 12px 20px;
        text-align: center;
        margin: 10px 0;
        user-select: all;
        border: 1px solid var(--color-void-black);
      }

      #copy-license-key {
        display: inline-block;
        background: var(--color-void-black);
        color: var(--color-lello);
        border: 1px solid var(--color-void-black);
        padding: var(--space-small) var(--space-large);
        font-family: var(--font-visitor);
        font-size: 12px;
        letter-spacing: var(--letter-spacing-wide);
        cursor: pointer;
        margin-top: var(--space-small);
        transition: all var(--transition-fast);
      }

      #copy-license-key:hover {
        background: var(--color-lello);
        color: var(--color-void-black);
      }

      .license-help {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--color-dark-gray);
        margin-top: var(--space-small);
      }
    </style>
</head>
<body>
    <div class="success-page-container">
        <div class="success-card">
            <!-- Logo -->
            <div class="success-logo">
                <a href="/">
                    <img src="assets/light/no3d-tools.png" alt="NO3D TOOLS" id="logo-image">
                </a>
            </div>

            <!-- Dynamic Content Container -->
            <div id="success-content">
                <!-- Loading State (default) -->
                <div class="loading-state" id="loading-state">
                    <div class="loading-spinner"></div>
                    <p class="success-message">Processing your order...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * Stripe Checkout success page.
         * Redirect uses session_id (cs_...) from Stripe success_url.
         */

        async function initSuccessPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session_id');
            const checkoutSuccess = urlParams.get('checkout_success');

            if (sessionId) {
                await fetchOrderDetailsAndShow(sessionId);
                return;
            }

            if (checkoutSuccess === 'true') {
                showSuccessState({});
                return;
            }

            showSuccessState({});
        }

        async function fetchOrderDetailsAndShow(sessionId) {
            try {
                const response = await fetch(
                    `/api/get-checkout-details?session_id=${encodeURIComponent(sessionId)}`
                );

                if (!response.ok) {
                    showSuccessState({});
                    return;
                }

                const data = await response.json();

                let portalUrl = null;
                if (data.customerId) {
                    try {
                        const portalResponse = await fetch(
                            `/api/get-customer-portal-url?session_id=${encodeURIComponent(sessionId)}`
                        );
                        if (portalResponse.ok) {
                            const portalData = await portalResponse.json();
                            if (portalData.portalUrl) {
                                portalUrl = portalData.portalUrl;
                            }
                        }
                    } catch (_) {
                        /* generic success still shown */
                    }
                }

                showSuccessState({ ...data, portalUrl });

                // Start polling for license key after displaying success state
                pollForLicenseKey(sessionId);
            } catch (error) {
                console.error('Error fetching order details:', error);
                showSuccessState({});
                // Still try to poll for the license key
                pollForLicenseKey(sessionId);
            }
        }

        function copyLicenseKey() {
            const key = document.getElementById('license-key-display').textContent;
            navigator.clipboard.writeText(key).then(() => {
                const btn = document.getElementById('copy-license-key');
                btn.textContent = 'COPIED!';
                setTimeout(() => { btn.textContent = 'COPY NO3D LINK KEY'; }, 2000);
            });
        }

        async function pollForLicenseKey(sessionId, maxAttempts = 10) {
            const licenseKeyEl = document.getElementById('license-key-display');
            const licenseStatusEl = document.getElementById('license-status');
            const copyBtn = document.getElementById('copy-license-key');
            const progressBar = document.getElementById('license-progress-bar');
            const progressWrap = document.getElementById('license-progress-wrap');

            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                try {
                    const response = await fetch(`/api/get-license-by-session?session_id=${encodeURIComponent(sessionId)}`);
                    const data = await response.json();

                    if (data.license_key) {
                        // Complete the progress bar
                        if (progressBar) {
                            progressBar.classList.remove('indeterminate');
                            progressBar.classList.add('complete');
                        }
                        // Brief pause to show the completed bar
                        await new Promise(r => setTimeout(r, 400));
                        if (progressWrap) progressWrap.style.display = 'none';

                        // Show the key
                        if (licenseKeyEl) {
                            licenseKeyEl.textContent = data.license_key;
                            licenseKeyEl.style.display = 'block';
                        }
                        if (copyBtn) {
                            copyBtn.style.display = 'inline-block';
                        }
                        if (licenseStatusEl) {
                            licenseStatusEl.textContent = '';
                        }
                        // Save to localStorage for website subscription detection
                        localStorage.setItem('no3d_license_key', data.license_key);
                        localStorage.setItem('no3d_license_valid', 'true');
                        localStorage.setItem('no3d_license_checked', Date.now().toString());
                        return data.license_key;
                    }
                } catch (err) {
                    console.error('License poll error:', err);
                }

                // Advance progress toward ~90% over the attempts
                const pct = Math.min(90, ((attempt + 1) / maxAttempts) * 90);
                if (progressBar) {
                    progressBar.classList.remove('indeterminate');
                    progressBar.style.width = `${pct}%`;
                }

                if (licenseStatusEl) {
                    const messages = [
                        'Setting up your account...',
                        'Generating your No3D Link key...',
                        'Almost there...',
                    ];
                    licenseStatusEl.textContent = messages[Math.min(attempt, messages.length - 1)];
                }

                await new Promise(resolve => setTimeout(resolve, 3000));
            }

            // Timeout — show fallback
            if (progressBar) {
                progressBar.classList.remove('indeterminate');
                progressBar.style.width = '100%';
                progressBar.style.background = 'var(--color-medium-gray)';
            }
            if (licenseStatusEl) {
                licenseStatusEl.textContent = 'Your No3D Link key will be emailed to you shortly. Check your inbox.';
            }
            return null;
        }

        function escText(str) {
            const el = document.createElement('span');
            el.textContent = str;
            return el.innerHTML;
        }

        function showSuccessState(data = {}) {
            const contentContainer = document.getElementById('success-content');

            let orderDetailsHtml = '';
            if (data.products && data.products.length > 0) {
                const productNames = data.products.map((p) => escText(p.name)).join(', ');
                orderDetailsHtml = `
                    <div class="order-details">
                        <div class="order-details-title">ORDER SUMMARY</div>
                        <div class="order-detail-row">
                            <span class="label">Plan:</span>
                            <span>${productNames}</span>
                        </div>
                        ${data.customerEmail ? `
                        <div class="order-detail-row">
                            <span class="label">Email:</span>
                            <span>${escText(data.customerEmail)}</span>
                        </div>
                        ` : ''}
                        ${data.total != null ? `
                        <div class="order-detail-row">
                            <span class="label">Total:</span>
                            <span>$${(data.total / 100).toFixed(2)}</span>
                        </div>
                        ` : ''}
                    </div>
                `;
            }

            const portalUrl = data.portalUrl || 'account.html';

            contentContainer.innerHTML = `
                <div class="success-icon">
                    <i class="fas fa-check"></i>
                </div>

                <h1 class="success-title">YOU'RE IN!</h1>

                <p class="success-message">
                    Your subscription is active. Here's everything you need to get started.
                </p>

                ${orderDetailsHtml}

                <div class="license-key-section">
                    <h3>YOUR NO3D LINK LICENSE KEY</h3>
                    <p id="license-status">Generating your No3D Link key...</p>
                    <div class="license-progress-wrap" id="license-progress-wrap">
                        <div class="license-progress-bar indeterminate" id="license-progress-bar"></div>
                    </div>
                    <div id="license-key-display" class="license-key-box" style="display: none;"></div>
                    <button id="copy-license-key" style="display: none;" onclick="copyLicenseKey()">COPY NO3D LINK KEY</button>
                </div>

                <div class="onboarding-steps">
                    <h3>GET STARTED</h3>
                    <div class="onboarding-step">
                        <span class="step-number">1</span>
                        <div class="step-content">
                            Download and install the No3d Tools addon in Blender<br>
                            (Edit → Preferences → Add-ons → Install from Disk)<br>
                            <a href="/guide.html" class="addon-download-btn" onclick="window.open('/api/download-addon','_blank');">DOWNLOAD ADDON</a>
                        </div>
                    </div>
                    <div class="onboarding-step">
                        <span class="step-number">2</span>
                        <div class="step-content">
                            Open addon preferences and paste your No3D Link License Key above
                        </div>
                    </div>
                    <div class="onboarding-step">
                        <span class="step-number">3</span>
                        <div class="step-content">
                            Click "Activate No3D Link" — all ${data.productCount || '64'} assets will appear in your Asset Browser
                        </div>
                    </div>
                </div>

                <a href="/" class="primary-cta">BROWSE THE LIBRARY →</a>

                <br><br>

                <a href="${portalUrl}" class="secondary-link"${portalUrl.startsWith('http') ? ' target="_blank" rel="noopener"' : ''}>Manage subscription</a>

                <div class="help-text">
                    Your No3D Link key has also been sent to your email.
                    <a href="mailto:support@no3dtools.com">Contact support</a> if you need help.
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', initSuccessPage);
    </script>
</body>
</html>
