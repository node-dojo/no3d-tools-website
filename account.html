<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account & Billing - NO3D Tools</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: var(--color-stone-gray); }
        .account-wrap {
            max-width: 560px;
            margin: var(--space-xlarge) auto;
            padding: var(--space-large);
        }
        .account-card {
            background: var(--color-paper-white);
            border: 1px solid var(--color-void-black);
            padding: var(--space-xlarge);
        }
        .account-card h1 {
            font-family: var(--font-visitor);
            font-size: var(--font-size-h1);
            text-transform: uppercase;
            margin-bottom: var(--space-medium);
            color: var(--color-void-black);
        }
        .account-card p {
            font-family: var(--font-mono);
            font-size: var(--font-size-base);
            color: var(--color-dark-gray);
            margin-bottom: var(--space-medium);
            line-height: 1.5;
        }
        .account-card label {
            font-family: var(--font-mono);
            font-size: var(--font-size-small);
            display: block;
            margin-bottom: var(--space-tiny);
            color: var(--color-void-black);
        }
        .account-card input[type="email"] {
            width: 100%;
            padding: var(--space-small);
            border: 1px solid var(--color-void-black);
            font-family: var(--font-mono);
            font-size: var(--font-size-base);
            margin-bottom: var(--space-medium);
            box-sizing: border-box;
        }
        .account-card button {
            background: var(--color-lello);
            color: var(--color-void-black);
            border: 1px solid var(--color-void-black);
            padding: var(--space-small) var(--space-large);
            font-family: var(--font-visitor);
            font-size: var(--font-size-h3);
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
        }
        .account-card button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .account-card input[type="text"] {
            width: 100%;
            padding: var(--space-small);
            border: 1px solid var(--color-void-black);
            font-family: var(--font-mono);
            font-size: var(--font-size-base);
            margin-bottom: var(--space-medium);
            box-sizing: border-box;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .account-section {
            margin-bottom: var(--space-xlarge);
            padding-bottom: var(--space-large);
            border-bottom: 1px solid var(--color-stone-gray);
        }
        .account-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .account-section h2 {
            font-family: var(--font-visitor);
            font-size: var(--font-size-h2);
            text-transform: uppercase;
            margin-bottom: var(--space-medium);
            color: var(--color-void-black);
        }
        .license-key-box {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            letter-spacing: 2px;
            background: var(--color-lello);
            color: var(--color-void-black);
            padding: 12px 20px;
            text-align: center;
            margin: var(--space-small) 0;
            user-select: all;
            border: 1px solid var(--color-void-black);
            word-break: break-all;
        }
        .btn-row {
            display: flex;
            gap: var(--space-small);
            margin-top: var(--space-small);
        }
        .btn-row button {
            flex: 1;
        }
        .btn-secondary {
            background: var(--color-void-black) !important;
            color: var(--color-lello) !important;
        }
        .btn-secondary:hover {
            background: var(--color-lello) !important;
            color: var(--color-void-black) !important;
        }
        #key-status {
            font-family: var(--font-mono);
            font-size: var(--font-size-small);
            margin-top: var(--space-small);
        }
        #sub-status-text {
            font-family: var(--font-mono);
            font-size: var(--font-size-small);
            color: var(--color-dark-gray);
            line-height: 1.6;
        }
        #sub-status-text a {
            color: var(--color-void-black);
        }
        .account-msg {
            font-family: var(--font-mono);
            font-size: var(--font-size-small);
            margin-top: var(--space-medium);
            color: var(--color-dark-gray);
        }
        .account-links {
            margin-top: var(--space-large);
            font-family: var(--font-mono);
            font-size: var(--font-size-small);
        }
        .account-links a {
            color: var(--color-void-black);
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-left">
            <a href="index.html" class="logo">
                <img src="assets/light/no3d-tools.png" alt="NO3D Tools" class="logo">
            </a>
        </div>
        <div class="header-icons">
            <a href="subscribe.html" class="header-icon" style="font-family: var(--font-visitor); font-size: 12px; text-decoration: none; color: var(--color-void-black);">Subscribe</a>
        </div>
    </header>

    <main class="account-wrap">
        <div class="account-card">
            <h1>Account</h1>

            <!-- Section A: License Key Management -->
            <div class="account-section">
                <h2>LICENSE KEY</h2>
                <div id="license-key-section">
                    <div id="stored-key-display" style="display: none;">
                        <p>Your license key:</p>
                        <div class="license-key-box" id="account-license-key"></div>
                        <div class="btn-row">
                            <button onclick="copyAccountLicenseKey()">COPY</button>
                            <button class="btn-secondary" onclick="validateStoredKey()">VALIDATE</button>
                        </div>
                        <p id="key-status"></p>
                    </div>
                    <div id="enter-key-section">
                        <p>Enter your license key:</p>
                        <input type="text" id="license-key-input" placeholder="NO3D-XXXX-XXXX-XXXX-XXXX">
                        <button onclick="saveLicenseKey()">SAVE LICENSE KEY</button>
                    </div>
                </div>
            </div>

            <!-- Section B: Subscription Status -->
            <div class="account-section">
                <h2>SUBSCRIPTION STATUS</h2>
                <div id="subscription-status">
                    <p id="sub-status-text">Save or validate your license key above to see subscription status.</p>
                </div>
            </div>

            <!-- Section C: Billing Portal (existing) -->
            <div class="account-section">
                <h2>BILLING PORTAL</h2>
                <p>
                    Manage your subscription in the Stripe customer portal. Enter the email you used at checkout.
                </p>
                <form id="portal-form">
                    <label for="billing-email">Email</label>
                    <input type="email" id="billing-email" name="email" autocomplete="email" required placeholder="you@example.com">
                    <button type="submit" id="portal-submit">Open billing portal</button>
                </form>
                <p class="account-msg" id="portal-msg" aria-live="polite"></p>
            </div>

            <div class="account-links">
                <a href="index.html">Store</a>
                &nbsp;&middot;&nbsp;
                <a href="subscribe.html">Subscribe</a>
            </div>
        </div>
    </main>

    <script>
        // --- License Key Management ---

        function initAccountPage() {
            const storedKey = localStorage.getItem('no3d_license_key');
            if (storedKey) {
                document.getElementById('stored-key-display').style.display = 'block';
                document.getElementById('account-license-key').textContent = storedKey;
                validateStoredKey();
            }
        }

        function saveLicenseKey() {
            const input = document.getElementById('license-key-input');
            const key = input.value.trim().toUpperCase();
            if (!key.match(/^NO3D-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/)) {
                alert('Invalid license key format. Expected: NO3D-XXXX-XXXX-XXXX-XXXX');
                return;
            }
            localStorage.setItem('no3d_license_key', key);
            localStorage.removeItem('no3d_license_valid');
            localStorage.removeItem('no3d_license_checked');
            document.getElementById('stored-key-display').style.display = 'block';
            document.getElementById('account-license-key').textContent = key;
            input.value = '';
            validateStoredKey();
        }

        async function validateStoredKey() {
            const key = localStorage.getItem('no3d_license_key');
            if (!key) return;

            const statusEl = document.getElementById('key-status');
            const subStatusEl = document.getElementById('sub-status-text');
            statusEl.textContent = 'Validating...';
            statusEl.style.color = 'var(--color-dark-gray)';

            try {
                const response = await fetch('/api/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ license_key: key }),
                });
                const data = await response.json();

                if (data.valid && data.status === 'active') {
                    statusEl.textContent = 'Active';
                    statusEl.style.color = '#2d8c2d';
                    subStatusEl.innerHTML = `Status: <strong>Active</strong><br>Expires: ${new Date(data.expires_at).toLocaleDateString()}`;
                    localStorage.setItem('no3d_license_valid', 'true');
                    localStorage.setItem('no3d_license_checked', Date.now().toString());
                } else if (data.valid && data.status === 'grace') {
                    statusEl.textContent = 'Grace Period';
                    statusEl.style.color = '#cc8800';
                    subStatusEl.innerHTML = `Status: <strong>Grace Period</strong><br>Payment failed. Update your payment method in the billing portal below before access is revoked.`;
                    localStorage.setItem('no3d_license_valid', 'true');
                    localStorage.setItem('no3d_license_checked', Date.now().toString());
                } else {
                    statusEl.textContent = 'Expired';
                    statusEl.style.color = '#cc0000';
                    subStatusEl.innerHTML = `Status: <strong>Expired</strong><br><a href="/subscribe.html">Re-subscribe</a> to regain access.`;
                    localStorage.setItem('no3d_license_valid', 'false');
                }
            } catch (err) {
                statusEl.textContent = 'Validation failed';
                statusEl.style.color = '#cc0000';
                console.error('License validation error:', err);
            }
        }

        function copyAccountLicenseKey() {
            const key = document.getElementById('account-license-key').textContent;
            navigator.clipboard.writeText(key).then(() => {
                const btns = document.querySelectorAll('.btn-row button');
                const copyBtn = btns[0];
                const original = copyBtn.textContent;
                copyBtn.textContent = 'COPIED!';
                setTimeout(() => { copyBtn.textContent = original; }, 2000);
            });
        }

        document.addEventListener('DOMContentLoaded', initAccountPage);

        // --- Billing Portal ---

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('portal-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('billing-email').value.trim();
            const btn = document.getElementById('portal-submit');
            const msg = document.getElementById('portal-msg');
            msg.textContent = '';
            btn.disabled = true;
            try {
                const res = await fetch('/api/create-portal-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok && data.portalUrl) {
                    window.location.href = data.portalUrl;
                    return;
                }
                msg.textContent = data.message || data.error || 'Could not open portal. Check your email or contact support.';
            } catch (err) {
                msg.textContent = 'Something went wrong. Please try again.';
            } finally {
                btn.disabled = false;
            }
        });
        });
    </script>
</body>
</html>
