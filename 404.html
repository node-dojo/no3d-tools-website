<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — NO3D TOOLS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="preload" href="./fonts/visitor.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <style>
        @font-face {
            font-family: 'Visitor';
            src: url('./fonts/visitor.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Visitor TT1 BRK';
            src: url('./fonts/visitor.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #E8E8E8;
            color: #222222;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            letter-spacing: 0.1em;
        }

        .error-container {
            max-width: 520px;
            width: 100%;
            text-align: center;
        }

        .error-code {
            font-family: 'Visitor TT1 BRK', 'Visitor', 'Space Mono', monospace;
            font-size: 120px;
            line-height: 1;
            color: #000000;
            margin-bottom: 24px;
            letter-spacing: 0.05em;
        }

        .error-label {
            font-family: 'Visitor TT1 BRK', 'Visitor', 'Space Mono', monospace;
            font-size: 18px;
            text-transform: uppercase;
            color: #303030;
            margin-bottom: 32px;
            letter-spacing: 0.15em;
        }

        .error-description {
            font-size: 13px;
            line-height: 22px;
            color: #303030;
            opacity: 0.95;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        .error-ascii {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.3;
            color: #303030;
            opacity: 0.35;
            margin-bottom: 40px;
            white-space: pre;
            user-select: none;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .nav-link {
            font-family: 'Visitor TT1 BRK', 'Visitor', 'Space Mono', monospace;
            font-size: 14px;
            text-transform: uppercase;
            text-decoration: none;
            color: #000000;
            padding: 10px 24px;
            border: 1px solid #000000;
            transition: background-color 0.15s, color 0.15s;
            letter-spacing: 0.1em;
            min-width: 240px;
        }

        .nav-link:hover {
            background-color: #f0ff00;
            color: #000000;
        }

        .nav-link.primary {
            background-color: #000000;
            color: #f0ff00;
        }

        .nav-link.primary:hover {
            background-color: #f0ff00;
            color: #000000;
        }

        .logo {
            margin-bottom: 48px;
        }

        .logo img {
            height: 36px;
            opacity: 0.8;
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 80px;
            }
            .error-label {
                font-size: 14px;
            }
            .error-ascii {
                font-size: 8px;
            }
            .nav-link {
                min-width: 200px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="logo">
            <a href="/"><img src="assets/light/no3d-tools.png" alt="NO3D TOOLS"></a>
        </div>

        <div class="error-code">404</div>
        <div class="error-label">Node Not Found</div>

        <div class="error-ascii">
    ┌──────────────────────────────┐
    │  404                         │
    │──────────────────────────────│
    │                              │
    │  ○ Geometry          ◇      │
    │  ■ This Page         ×      │
    │  □ Exists                   │
    │                              │
    └──────────────────────────────┘
        </div>

        <p class="error-description">
            The page you're looking for doesn't exist or has been moved.
        </p>

        <div class="nav-links">
            <a href="/" class="nav-link primary">Browse Tools</a>
            <a href="/subscribe.html" class="nav-link">Become a Member</a>
            <a href="/guide.html" class="nav-link">Getting Started</a>
        </div>
    </div>
</body>
</html>
