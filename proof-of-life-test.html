<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proof of Life — Test</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="blog.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="preload" href="fonts/visitor.woff2" as="font" type="font/woff2" crossorigin="anonymous">
  <style>
    @font-face { font-family: 'Visitor'; src: url('fonts/visitor.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Visitor'; src: url('fonts/visitor.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Visitor TT1 BRK'; src: url('fonts/visitor.woff2') format('woff2'); font-weight: normal; font-style: normal; font-display: swap; }
  </style>
</head>
<body>
  <div class="blog-container">
    <h1 class="blog-page-title">PROOF OF LIFE — TEST</h1>
    <p class="loading-message" style="padding: 0 0 24px 0;">Paste a .jsonl sidecar file or use the generated sample below.</p>

    <proof-of-life id="player" target="#article-content"></proof-of-life>

    <div id="article-content" class="product-description">
      <p>Sample article body — replay replaces this region during playback.</p>
    </div>
  </div>

  <script src="proof-of-life.js"></script>
  <script>
    // Generate a sample JSONL log that simulates typing "Hello, world!\n\nThis is a test of Proof of Life."
    const text = "Hello, world!\n\nThis is a test of Proof of Life.\n\nIt captures every keystroke, deletion, and revision.\nThe messy human process, preserved.";
    const events = [];
    let pos = 0;
    let time = 0;

    for (const ch of text) {
      // Simulate realistic typing delays
      const delay = 50 + Math.floor(Math.random() * 120);
      time += delay;
      events.push([delay, pos, ch, ""]);
      pos++;
    }

    // Simulate some deletions — go back and fix a "typo"
    // Delete "preserved" and retype it
    const delStart = text.indexOf("preserved");
    const delWord = "preserved";
    events.push([800, delStart, "", delWord]);
    events.push([200, delStart, "captured forever", ""]);

    // Build JSONL
    const header = JSON.stringify({ v: 1, sid: "test-session-1", t: Date.now(), doc: "" });
    const lines = [header, ...events.map(e => JSON.stringify(e))].join("\n");

    // Create a blob URL so the component can fetch it
    const blob = new Blob([lines], { type: "application/jsonl" });
    const url = URL.createObjectURL(blob);

    document.getElementById("player").setAttribute("src", url);
  </script>
</body>
</html>
