<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @font-face {
      font-family: 'LED Dot-Matrix';
      src: url('./fonts/LEDDotMatrix.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 600px;
      background: #eaeaea;
      padding: 40px 48px;
    }
    .hero-content {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }
    .hero-image-frame {
      width: 200px;
      height: 280px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      background: #f0ff00;
    }
    /* Per-newsletter image: desaturated + multiply blend */
    .hero-image-inner {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
      mix-blend-mode: multiply;
      display: block;
    }
    /* Thorny archway overlay — always on top */
    .hero-image-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      z-index: 2;
    }
    .hero-text {
      flex: 1;
      min-width: 0;
    }
    .subject-line {
      font-family: 'LED Dot-Matrix', monospace;
      font-size: 48px;
      line-height: 1.11;
      color: #000;
      word-wrap: break-word;
    }
    .hero-caption {
      margin-top: 16px;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-size: 10px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="hero-content">
    <div class="hero-image-frame">
      {{HERO_INNER_IMAGE}}
      <img class="hero-image-overlay" src="./assets/thorny-archway-overlay.png" alt="">
    </div>
    <div class="hero-text">
      <div class="subject-line">{{SUBJECT}}</div>
    </div>
  </div>
  <div class="hero-caption">{{CAPTION}}</div>
</body>
</html>
